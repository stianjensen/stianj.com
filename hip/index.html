<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>hip.</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  transition: background 0.3s;
}

#text {
  position: fixed;
  inset: 0;
  padding: 16px;
  background: transparent;
  color: var(--fg);
  font-family: system-ui, -apple-system, sans-serif;
  white-space: pre;
  overflow: hidden;
  outline: none;
  border: none;
  cursor: text;
  line-height: 1.15;
  transition: color 0.3s;
  caret-color: var(--fg);
}

#text.hide-caret {
  caret-color: transparent;
  cursor: none;
}

#text.marquee {
  white-space: nowrap;
  overflow: visible;
}

#text.marquee.rotated {
  inset: auto;
  transform: rotate(90deg);
  transform-origin: center center;
}

#marquee-inner {
  display: inline-block;
  will-change: transform;
}

#text:empty::before {
  content: "Type something";
  color: var(--fg);
  opacity: 0.25;
}

#toolbar {
  position: fixed;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 10;
}

#toolbar.visible {
  opacity: 1;
}

#toolbar.rotated {
  top: auto;
  bottom: 32px;
  right: 44px; /* 16px margin + 28px toolbar height */
  transform: rotate(90deg);
  transform-origin: bottom right;
}

.swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(128,128,128,0.3);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}

.swatch:hover {
  transform: scale(1.2);
}

.swatch.active {
  border-color: var(--fg);
}

.toolbar-sep {
  width: 1px;
  background: rgba(128,128,128,0.3);
  margin: 2px 4px;
}

.tb-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 2px solid rgba(128,128,128,0.3);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, border-color 0.15s;
}

.tb-btn:hover {
  transform: scale(1.2);
}

.tb-btn.active {
  border-color: var(--fg);
}

.tb-btn svg {
  width: 14px;
  height: 14px;
}

#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--fg);
  color: var(--bg);
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 20;
  pointer-events: none;
  text-align: center;
}

#toast.visible {
  opacity: 1;
}
</style>
</head>
<body>
<div id="toolbar"></div>
<div id="toast"></div>
<div id="text" contenteditable="true" spellcheck="false"></div>
<script>
const el = document.getElementById('text');
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isStandalone = navigator.standalone === true || window.matchMedia('(display-mode: fullscreen)').matches;
let rafId = null;

function fit() {
  if (marqueeActive) {
    applyMarqueeLayout();
    return;
  }

  // Use textContent to measure — ignore empty trailing newline
  const raw = el.textContent;
  const text = raw || 'X'; // fallback for measurement when empty

  el.style.paddingTop = '16px'; // Reset before measuring

  // Binary search for largest font-size that fits
  let lo = 1;
  let hi = 1000;

  while (hi - lo > 0.5) {
    const mid = (lo + hi) / 2;
    el.style.fontSize = mid + 'px';
    if (el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight) {
      hi = mid;
    } else {
      lo = mid;
    }
  }

  el.style.fontSize = lo + 'px';

  // Center vertically
  const lines = (el.textContent || 'X').split('\n').length;
  const contentHeight = lines * lo * 1.15;
  const availableHeight = el.clientHeight - 32; // minus top+bottom padding
  const extraSpace = availableHeight - contentHeight;
  el.style.paddingTop = (extraSpace > 0 ? 16 + extraSpace / 2 : 16) + 'px';
}

function requestFit() {
  if (rafId) return;
  rafId = requestAnimationFrame(() => {
    rafId = null;
    fit();
  });
}

el.addEventListener('input', requestFit);

// Normalize contenteditable newlines — browsers insert <div>, <br>, etc.
el.addEventListener('beforeinput', (e) => {
  if (e.inputType === 'insertParagraph' || e.inputType === 'insertLineBreak') {
    e.preventDefault();
    const sel = window.getSelection();
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const nl = document.createTextNode('\n');
    range.insertNode(nl);
    range.setStartAfter(nl);
    range.setEndAfter(nl);
    sel.removeAllRanges();
    sel.addRange(range);
    requestFit();
  }
});

// Paste as plain text only
el.addEventListener('paste', (e) => {
  e.preventDefault();
  const text = e.clipboardData.getData('text/plain');
  const sel = window.getSelection();
  const range = sel.getRangeAt(0);
  range.deleteContents();
  const node = document.createTextNode(text);
  range.insertNode(node);
  range.setStartAfter(node);
  range.setEndAfter(node);
  sel.removeAllRanges();
  sel.addRange(range);
  requestFit();
});

// Re-fit on resize
new ResizeObserver(requestFit).observe(el);
addEventListener('resize', requestFit);

// --- Toolbar: themes ---
const themes = [
  { bg: '#0f0f11', fg: '#e8e4df' },
  { bg: '#1a1a2e', fg: '#c9b1ff' },
  { bg: '#f5f0eb', fg: '#2c2c2c' },
  { bg: '#0d1b2a', fg: '#7ec8e3' },
  { bg: '#1b4332', fg: '#95d5b2' },
  { bg: '#2b1a12', fg: '#e8a87c' },
  { bg: '#faf3e0', fg: '#bf4a2e' },
];

const root = document.documentElement;
const toolbar = document.getElementById('toolbar');

function applyTheme(i) {
  root.style.setProperty('--bg', themes[i].bg);
  root.style.setProperty('--fg', themes[i].fg);
  toolbar.querySelectorAll('.swatch').forEach((s, j) =>
    s.classList.toggle('active', j === i)
  );
}

themes.forEach((t, i) => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = t.bg;
  s.addEventListener('click', () => applyTheme(i));
  toolbar.appendChild(s);
});

applyTheme(Math.floor(Math.random() * themes.length));

// --- Toolbar: bold ---
toolbar.appendChild(Object.assign(document.createElement('div'), { className: 'toolbar-sep' }));

const boldBtn = document.createElement('div');
boldBtn.className = 'tb-btn';
boldBtn.innerHTML = `<svg viewBox="0 0 14 14" fill="var(--fg)" stroke="none">
  <path d="M3 1.5h4.5c1.8 0 3.2 1.2 3.2 2.8 0 1.1-.6 2-1.6 2.5 1.2.4 2.1 1.5 2.1 2.8 0 1.8-1.5 3-3.4 3H3V1.5zM5 6h2.2c.9 0 1.5-.5 1.5-1.3S8.1 3.5 7.2 3.5H5V6zm0 2v3h2.5c1 0 1.6-.6 1.6-1.5S8.5 8 7.5 8H5z"/>
</svg>`;
boldBtn.addEventListener('click', () => {
  const isBold = el.style.fontWeight === 'bold';
  el.style.fontWeight = isBold ? '' : 'bold';
  boldBtn.classList.toggle('active', !isBold);
  requestFit();
});
toolbar.appendChild(boldBtn);

// --- Toolbar: alignment ---
const alignOptions = [
  { value: 'left', svg: '<line x1="1" y1="2" x2="10" y2="2"/><line x1="1" y1="5.5" x2="13" y2="5.5"/><line x1="1" y1="9" x2="8" y2="9"/><line x1="1" y1="12.5" x2="12" y2="12.5"/>' },
  { value: 'center', svg: '<line x1="2" y1="2" x2="12" y2="2"/><line x1="1" y1="5.5" x2="13" y2="5.5"/><line x1="3" y1="9" x2="11" y2="9"/><line x1="1.5" y1="12.5" x2="12.5" y2="12.5"/>' },
  { value: 'right', svg: '<line x1="4" y1="2" x2="13" y2="2"/><line x1="1" y1="5.5" x2="13" y2="5.5"/><line x1="6" y1="9" x2="13" y2="9"/><line x1="2" y1="12.5" x2="13" y2="12.5"/>' },
];

function setAlign(value) {
  el.style.textAlign = value;
  toolbar.querySelectorAll('.align-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.align === value)
  );
  requestFit();
}

alignOptions.forEach(opt => {
  const btn = document.createElement('div');
  btn.className = 'tb-btn align-btn';
  btn.dataset.align = opt.value;
  btn.innerHTML = `<svg viewBox="0 0 14 14" stroke="var(--fg)" stroke-width="1.5" stroke-linecap="round">${opt.svg}</svg>`;
  btn.addEventListener('click', () => setAlign(opt.value));
  toolbar.appendChild(btn);
});

setAlign('left');

// --- Toolbar: rebalance ---
const rebalanceBtn = document.createElement('div');
rebalanceBtn.className = 'tb-btn';
rebalanceBtn.innerHTML = `<svg viewBox="0 0 14 14" stroke="var(--fg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <line x1="1" y1="3" x2="12" y2="3"/>
  <path d="M12 3v3.5a2 2 0 0 1-2 2H4"/>
  <polyline points="6,6.5 4,8.5 6,10.5"/>
  <line x1="1" y1="12" x2="8" y2="12"/>
</svg>`;
rebalanceBtn.addEventListener('click', () => {
  if (marqueeActive) return;
  const raw = el.textContent;
  const words = raw.replace(/\n/g, ' ').split(/\s+/).filter(w => w);
  if (words.length <= 1) return;

  const maxLines = Math.min(words.length, 10);
  let bestSize = 0;
  let bestText = '';

  for (let n = 1; n <= maxLines; n++) {
    // Distribute words evenly across n lines by character count
    const totalChars = words.reduce((s, w) => s + w.length, 0) + words.length - 1;
    const targetPerLine = totalChars / n;
    const lines = [];
    let cur = [];
    let curLen = 0;

    for (const word of words) {
      const newLen = curLen + (cur.length > 0 ? 1 : 0) + word.length;
      if (cur.length > 0 && newLen > targetPerLine && lines.length < n - 1) {
        lines.push(cur.join(' '));
        cur = [word];
        curLen = word.length;
      } else {
        cur.push(word);
        curLen = newLen;
      }
    }
    if (cur.length > 0) lines.push(cur.join(' '));

    const candidate = lines.join('\n');
    el.textContent = candidate;

    // Binary search for max font size
    el.style.paddingTop = '16px';
    let lo = 1, hi = 1000;
    while (hi - lo > 0.5) {
      const mid = (lo + hi) / 2;
      el.style.fontSize = mid + 'px';
      if (el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight) {
        hi = mid;
      } else {
        lo = mid;
      }
    }

    if (lo > bestSize) {
      bestSize = lo;
      bestText = candidate;
    }
  }

  el.textContent = bestText;
  fit();

  // Place cursor at end
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
});
toolbar.appendChild(rebalanceBtn);

// --- Toolbar: marquee ---
toolbar.appendChild(Object.assign(document.createElement('div'), { className: 'toolbar-sep' }));

const marqueeBtn = document.createElement('div');
marqueeBtn.className = 'tb-btn';
marqueeBtn.innerHTML = `<svg viewBox="0 0 14 14" fill="var(--fg)" stroke="none">
  <polygon points="3,1 13,7 3,13"/>
</svg>`;

let marqueeActive = false;
let originalText = null;
let marqueeRaf = null;

function marqueeLandscape() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const portrait = isIOS && vh > vw;
  return { portrait, landW: portrait ? vh : vw, landH: portrait ? vw : vh };
}

function applyMarqueeLayout() {
  const { portrait, landW, landH } = marqueeLandscape();
  const fontSize = (landH - 32) / 1.15;
  el.style.fontSize = fontSize + 'px';

  if (portrait) {
    el.classList.add('rotated');
    toolbar.classList.add('rotated');
    el.style.width = landW + 'px';
    el.style.height = landH + 'px';
    el.style.top = ((window.innerHeight - landH) / 2) + 'px';
    el.style.left = ((window.innerWidth - landW) / 2) + 'px';
  } else {
    el.classList.remove('rotated');
    toolbar.classList.remove('rotated');
    el.style.width = '';
    el.style.height = '';
    el.style.top = '';
    el.style.left = '';
  }

  const contentHeight = fontSize * 1.15;
  const extra = landH - 32 - contentHeight;
  el.style.paddingTop = (extra > 0 ? 16 + extra / 2 : 16) + 'px';
}

function enterMarquee() {
  originalText = el.textContent;
  const display = originalText.replace(/\n/g, ' \u00b7 ');

  el.textContent = '';
  const span = document.createElement('span');
  span.id = 'marquee-inner';
  span.textContent = display;
  el.appendChild(span);

  el.contentEditable = 'false';
  el.classList.add('marquee');

  applyMarqueeLayout();
  startMarqueeAnimation();
}

function exitMarquee() {
  if (marqueeRaf) cancelAnimationFrame(marqueeRaf);
  marqueeRaf = null;
  el.classList.remove('marquee', 'rotated');
  toolbar.classList.remove('rotated');
  el.style.width = '';
  el.style.height = '';
  el.style.top = '';
  el.style.left = '';
  el.textContent = originalText;
  originalText = null;
  el.contentEditable = 'true';
  fit();
  el.focus();
}

function startMarqueeAnimation() {
  if (marqueeRaf) cancelAnimationFrame(marqueeRaf);
  const span = document.getElementById('marquee-inner');
  if (!span) return;

  const speed = 400; // px/s
  const { landW } = marqueeLandscape();
  let scrollX = landW;
  let lastTime = null;
  let pausing = false;

  function tick(ts) {
    if (!marqueeActive) return;
    if (lastTime === null) lastTime = ts;
    const dt = (ts - lastTime) / 1000;
    lastTime = ts;

    if (!pausing) {
      scrollX -= speed * dt;
      span.style.transform = `translateX(${scrollX}px)`;
      const textWidth = span.offsetWidth;
      if (scrollX < -textWidth) {
        pausing = true;
        const { landW: lw } = marqueeLandscape();
        span.style.transform = `translateX(${lw}px)`;
        setTimeout(() => {
          if (!marqueeActive) return;
          scrollX = lw;
          pausing = false;
          lastTime = null;
          marqueeRaf = requestAnimationFrame(tick);
        }, 1000);
        return;
      }
    }
    marqueeRaf = requestAnimationFrame(tick);
  }
  marqueeRaf = requestAnimationFrame(tick);
}

function toggleMarquee() {
  if (!marqueeActive && !el.textContent.trim()) return;
  marqueeActive = !marqueeActive;
  marqueeBtn.classList.toggle('active', marqueeActive);
  if (marqueeActive) {
    enterMarquee();
  } else {
    exitMarquee();
  }
}

marqueeBtn.addEventListener('click', toggleMarquee);
toolbar.appendChild(marqueeBtn);

// --- Toast ---
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), duration);
}

// --- Toolbar: fullscreen ---
if (!(isIOS && isStandalone)) {
toolbar.appendChild(Object.assign(document.createElement('div'), { className: 'toolbar-sep' }));

const fsBtn = document.createElement('div');
fsBtn.className = 'tb-btn';
fsBtn.innerHTML = `<svg viewBox="0 0 14 14" stroke="var(--fg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <polyline points="1,5 1,1 5,1"/><polyline points="9,1 13,1 13,5"/>
  <polyline points="13,9 13,13 9,13"/><polyline points="5,13 1,13 1,9"/>
</svg>`;
fsBtn.addEventListener('click', () => {
  if (isIOS && !isStandalone) {
    showToast('Add to Home Screen for fullscreen', 3500);
    return;
  }
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {
      showToast('Fullscreen not supported');
    });
  } else {
    document.exitFullscreen();
  }
});
toolbar.appendChild(fsBtn);
} // end fullscreen (hidden when iOS standalone)

// --- Toolbar: show/hide on mouse movement ---
let fadeTimer;
function showToolbar() {
  toolbar.classList.add('visible');
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => toolbar.classList.remove('visible'), 1500);
}
addEventListener('mousemove', showToolbar);
addEventListener('touchstart', showToolbar);

// --- Hide caret after inactivity ---
let caretTimer;
function showCaret() {
  el.classList.remove('hide-caret');
  clearTimeout(caretTimer);
  caretTimer = setTimeout(() => el.classList.add('hide-caret'), 3000);
}
el.addEventListener('keydown', showCaret);
el.addEventListener('mousedown', showCaret);
el.addEventListener('mousemove', showCaret);

// Initial focus
el.focus();
fit();
</script>
</body>
</html>
